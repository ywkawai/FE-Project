  dom_ymin         =  -5.0D3,  
  dom_ymax         =   5.0D3,  
  isPeriodicY      = .true., 
  dom_zmin         =  -30.0D0,  
  dom_zmax         =    0D3, 
  NprcX            = 1, 
  NeX              = 1,
  NprcY            = 1, 
  NeY              = 1,
  NeZ              = 1,
  PolyOrder_h      = 7,
  PolyOrder_v      = 7,
!  LumpedMassMatFlag = .true.,   
/
